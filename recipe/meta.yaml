{% set name = "stripe" %}
{% set version = "12.0.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 3fc7cc190946d8ebcc5b637e7e04f387d61b9c5156a89619a3ba90704ac09d4a

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  skip: true  # [py<36]
requirements:
  host:
    - python
    - pip
    - setuptools
    - wheel
  run:
    - python
    - requests >=2.20
    - typing-extensions >3.7.2,<=4.2.0  # [py<37]

test:
  requires:
    - pip
    - typing-extensions
  imports:
    - stripe
    - stripe.api_resources
    - stripe.api_resources.abstract
    - stripe.api_resources.issuing
    - stripe.api_resources.sigma
  commands:
    - pip check

about:
  home: https://github.com/stripe/stripe-python
  license: MIT
  license_file: LICENSE
  license_family: MIT
  summary: Stripe python bindings
  description: |
    Stripe is the best software platform for running an internet business.
  doc_url: https://stripe.com/docs/api/python#intro
  doc_source_url: https://github.com/stripe/stripe-python
  dev_url: https://github.com/stripe/stripe-python

extra:
  recipe-maintainers:
    - nehaljwani
