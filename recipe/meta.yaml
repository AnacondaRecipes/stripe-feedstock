{% set name = "stripe" %}
{% set version = "14.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: d002ecd2966a984a52a43e865bc9346c389f20e768e13fdbbe9cb9474f917c23

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  skip: true  # [py<37]

requirements:
  host:
    - python
    - pip
    - flit-core >=3.11,<4
  run:
    - python
    - typing-extensions >3.7.2,<=4.2.0  # [py<37]
    - typing-extensions >=4.5.0  # [py>=37]
    - requests >=2.20  # [py>=30]

test:
  imports:
    - stripe
    - stripe._account
    - stripe._any_iterator
    - stripe._api_mode
    - stripe._api_requestor
    - stripe._api_resource
    - stripe._api_version
    - stripe._app_info
    - stripe._application_fee
    - stripe._base_address
    - stripe._charge
    - stripe._client_options
    - stripe._createable_api_resource
    - stripe._custom_method
    - stripe._customer
    - stripe._deletable_api_resource
    - stripe._encode
    - stripe._error
    - stripe._error_object
    - stripe._event
    - stripe._expandable_field
    - stripe._file
    - stripe._http_client
    - stripe._invoice
    - stripe._list_object
    - stripe._listable_api_resource
    - stripe._multipart_data_generator
    - stripe._nested_resource_class_methods
    - stripe._oauth
    - stripe._oauth_service
    - stripe._person
    - stripe._request_metrics
    - stripe._request_options
    - stripe._requestor_options
    - stripe._search_result_object
    - stripe._searchable_api_resource
    - stripe._singleton_api_resource
    - stripe._stripe_client
    - stripe._stripe_context
    - stripe._stripe_object
    - stripe._stripe_response
    - stripe._stripe_service
    - stripe._test_helpers
    - stripe._transfer
    - stripe._updateable_api_resource
    - stripe._util
    - stripe._v1_services
    - stripe._v2_services
    - stripe._verify_mixin
    - stripe._version
    - stripe._webhook
    - stripe.billing._meter
    - stripe.events
    - stripe.oauth_error
  requires:
    - pip
    - pytest
    - anyio
  commands:
    - pip check
    # INTERNALERROR> urllib3.exceptions.NewConnectionError: HTTPConnection(host='localhost', port=12111): Failed to establish a new connection: [Errno 61] Connection refused
    # - pytest -v tests

about:
  home: https://github.com/stripe/stripe-python
  license: MIT
  license_file: LICENSE
  license_family: MIT
  summary: Stripe python bindings
  description: |
    Stripe is the best software platform for running an internet business.
  doc_url: https://stripe.com/docs/api/python#intro
  doc_source_url: https://github.com/stripe/stripe-python
  dev_url: https://github.com/stripe/stripe-python

extra:
  recipe-maintainers:
    - nehaljwani
